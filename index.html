<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZPD 終查終端 V7.5</title>
    <style>
        :root { 
            --gold: #fbaf00; --cyan: #00ebff; --dark: #020612; --blue: #0a2463; 
        }
        * { box-sizing: border-box; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background: var(--dark); color: white; margin: 0; text-align: center; line-height: 1.5; }

        /* 啟動畫面 */
        #boot-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .boot-title { font-size: 24px; font-weight: bold; margin-bottom: 30px; color: white; }
        .start-btn {
            background: var(--blue); border: 2px solid var(--cyan); color: var(--cyan);
            padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 15px rgba(0,235,255,0.3);
        }

        /* 頂部標題列 (統一字體大小) */
        .header { background: var(--blue); padding: 20px; border-bottom: 3px solid var(--gold); }
        .header h1 { margin: 0; font-size: 20px; color: var(--gold); letter-spacing: 1px; }

        /* 進度面板 (統一字體大小) */
        .status-box { padding: 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid #222; }
        .status-text { display: flex; justify-content: space-between; font-size: 15px; color: #aaa; margin-bottom: 8px; }
        .bar-bg { height: 10px; background: #111; border-radius: 5px; overflow: hidden; border: 1px solid #333; }
        #bar-fill { height: 100%; width: 0%; background: var(--cyan); transition: 0.8s ease-out; }

        /* 寶石網格 */
        .grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; 
            padding: 20px; max-width: 420px; margin: auto; 
        }
        .slot { 
            aspect-ratio: 1; background: #080808; border: 1px solid #333; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0.2; filter: grayscale(1); transition: 0.4s;
        }
        .slot.active { opacity: 1; filter: grayscale(0); border-color: var(--cyan); background: rgba(0,235,255,0.05); }
        .slot img { width: 65%; height: 65%; object-fit: contain; }
        .slot span { font-size: 15px; margin-top: 8px; color: #555; }
        .active span { color: var(--cyan); font-weight: bold; }

        /* 彈窗介面 (統一字體大小) */
        #pop-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; z-index: 1000; align-items: center; justify-content: center; 
        }
        .pop-card { 
            background: var(--blue); border: 2px solid var(--gold); 
            width: 85%; max-width: 320px; padding: 25px; border-radius: 20px; 
        }
        .pop-card h2 { color: var(--gold); margin: 0 0 15px; font-size: 20px; }
        .pop-card p { font-size: 15px; line-height: 1.6; color: #eee; margin-bottom: 20px; }
        .pop-card button { 
            width: 100%; padding: 12px; background: var(--gold); border: none; 
            border-radius: 8px; font-weight: bold; font-size: 15px; color: #000;
        }
    </style>
</head>
<body>

<div id="boot-screen">
    <div class="boot-title">ZPD 身份驗證完畢</div>
    <button class="start-btn" onclick="startSystem()">啟動偵查終端機</button>
</div>

<div class="header">
    <h1>聖靈寶石偵查紀錄簿</h1>
</div>

<div class="status-box">
    <div class="status-text">
        <span>案件收集進度</span>
        <span id="prog-text">0%</span>
    </div>
    <div class="bar-bg"><div id="bar-fill"></div></div>
</div>

<div class="grid" id="main-grid">
    </div>

<div id="pop-overlay">
    <div class="pop-card">
        <h2 id="p-title">尋獲寶石</h2>
        <p id="p-body"></p>
        <button onclick="closePop()">存入系統資料庫</button>
    </div>
</div>
