<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZPD 聖靈寶石終端機 V10</title>
    <style>
        :root { --zpd-blue: #0a2463; --zpd-dark: #020612; --zpd-gold: #fbaf00; --zpd-cyan: #00ebff; }
        body { background: var(--zpd-dark); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* 啟動黑畫面：防呆設計，點擊任何處進入 */
        #boot-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; z-index: 999; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer;
        }

        .header { background: var(--zpd-blue); padding: 15px; border-bottom: 4px solid var(--zpd-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .progress-container { padding: 15px; background: rgba(0, 235, 255, 0.05); border-bottom: 1px solid #222; }
        
        /* 寶石網格 */
        .gem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px; max-width: 400px; margin: auto; }
        .gem-slot { 
            aspect-ratio: 1; border: 2px solid #333; border-radius: 12px; 
            background: #050505; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; position: relative;
        }
        
        /* JPG 專用濾鏡：未解鎖時呈現暗灰色剪影 */
        .gem-icon { 
            width: 85%; height: 85%; object-fit: contain; 
            filter: brightness(10%) grayscale(100%); opacity: 0.15; 
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        /* 解鎖樣式：恢復彩色、發光與放大 */
        .gem-slot.unlocked { border-color: var(--zpd-cyan); background: rgba(0, 235, 255, 0.1); box-shadow: 0 0 15px rgba(0, 235, 255, 0.4); }
        .unlocked .gem-icon { filter: brightness(100%) grayscale(0%); opacity: 1; transform: scale(1.1); }

        /* 領取彈窗 */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 100; backdrop-filter: blur(5px); }
