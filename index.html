<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZPD 終查終端 V6</title>
    <style>
        :root { --gold: #fbaf00; --cyan: #00ebff; --dark: #020612; --blue: #0a2463; }
        * { box-sizing: border-box; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; text-align: center; }

        /* 啟動畫面：改為手動點擊按鈕進入 */
        #boot-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .start-btn {
            background: var(--blue); border: 2px solid var(--cyan); color: var(--cyan);
            padding: 20px 40px; font-size: 24px; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 20px rgba(0,235,255,0.4); margin-top: 20px;
        }

        /* 主標題 */
        .header { background: var(--blue); padding: 15px; border-bottom: 3px solid var(--gold); }
        .header h1 { margin: 0; font-size: 20px; color: var(--gold); }

        /* 進度條 */
        .status-box { padding: 15px; background: #111; border-bottom: 1px solid #333; }
        .bar-bg { height: 12px; background: #222; border-radius: 6px; margin-top: 5px; overflow: hidden; border: 1px solid #444; }
        #bar-fill { height: 100%; width: 0%; background: var(--cyan); transition: 0.8s; }

        /* 網格 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; max-width: 400px; margin: auto; }
        .slot { 
            aspect-ratio: 1; background: #080808; border: 1px solid #333; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0.2; filter: grayscale(1); transition: 0.3s;
        }
        .slot.active { opacity: 1; filter: grayscale(0); border-color: var(--cyan); background: rgba(0,235,255,0.1); }
        .slot img { width: 70%; height: 70%; object-fit: contain; }
        .slot span { font-size: 10px; margin-top: 5px; color: #666; }
        .active span { color: var(--cyan); font-weight: bold; }

        /* 彈窗 */
        #pop-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 1000; align-items: center; justify-content: center; }
        .pop-card { background: var(--blue); border: 2px solid var(--gold); width: 85%; max-width: 300px; padding: 20px; border-radius: 15px; }
        .pop-card button { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 5px; font-weight: bold; margin-top: 15px; font-size: 16px; }
    </style>
</head>
<body>

<div id="boot-screen">
    <div style="font-size: 14px; color: var(--cyan); letter-spacing: 3px;">ZPD PDT SYSTEM V6</div>
    <div style="font-size: 30px; font-weight: bold; margin: 10px 0;">[ 身份驗證完畢 ]</div>
    <button class="start-btn" onclick="startSystem()">點擊啟動終端機</button>
</div>

<div class="header">
    <h1>聖靈寶石偵查紀錄簿</h1>
</div>

<div class="status-box">
    <div style="display:flex; justify-content:space-between; font-size: 13px;">
        <span>案件收集進度</span>
        <span id="prog-text">0%</span>
    </div>
    <div class="bar-bg"><div id="bar-fill"></div></div>
</div>

<div class="grid" id="main-grid">
    </div>

<div id="pop-overlay">
    <div class="pop-card">
        <h2 id="p-title" style="color:var(--gold); margin:0;">尋獲寶石</h2>
        <p id="p-body" style="line-height:1.5; margin:15px 0;"></p>
        <button onclick="closePop()">存入系統並同步</button>
    </div>
</div>

<script>
    const GEMS = {
        '1': { n: '喜樂', m: '靠主常存喜樂，是健康的良藥。' },
        '2': { n: '恩慈', m: '良善的心能化解一切仇恨。' },
        '3': { n: '節制', m: '能掌管情緒的人才是真正強者。' },
        '4': { n: '仁愛', m: '愛是所有品格中最偉大的力量。' },
        '5': { n: '和平', m: '使人和睦的人，必稱為神的兒子。' },
        '6': { n: '溫柔', m: '柔和的回答能消退怒氣。' },
        '7': { n: '忍耐', m: '在困境中學習等待，神必開路。' },
        '8': { n: '信實', m: '誠實守信是警員最珍貴的品格。' },
        '9': { n: '良善', m: '心存正直，行神眼中看為正的事。' }
    };

    const KEY = 'ZPD_MASTER_SAVE';
    const IMG_URL = 'https://nevemiau0612.github.io/summer202607/gem';

    function startSystem() {
        document.getElementById('boot-screen').style.display = 'none';
        checkUrl();
    }

    function checkUrl() {
        const params = new URLSearchParams(window.location.search);
        const gemId = params.get('gem');
        let saved = JSON.parse(localStorage.getItem(KEY) || '[]');

        if (gemId && GEMS[gemId]) {
            if (!saved.includes(gemId)) {
                saved.push(gemId);
                localStorage.setItem(KEY, JSON.stringify(saved));
            }
            showPop(gemId);
            // 清理網址不刷新
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        updateUI(saved);
    }

    function updateUI(saved) {
        // 先生成格項
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        for (let i = 1; i <= 9; i++) {
            const isActive = saved.includes(String(i));
            grid.innerHTML += `
                <div class="slot ${isActive ? 'active' : ''}">
                    <img src="${IMG_URL}${i}.png">
                    <span>${GEMS[i].n}</span>
                </div>
            `;
        }
        const p = Math.floor((saved.length / 9) * 100);
        document.getElementById('prog-text').innerText = p + "%";
        document.getElementById('bar-fill').style.width = p + "%";
    }

    function showPop(id) {
        document.getElementById('p-title').innerText = "尋獲：" + GEMS[id].n + "寶石";
        document.getElementById('p-body').innerText = GEMS[id].m;
        document.getElementById('pop-overlay').style.display = 'flex';
    }

    function closePop() {
        document.getElementById('pop-overlay').style.display = 'none';
    }

    // 頁面加載後直接生成 UI (未解鎖狀態)
    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem(KEY) || '[]');
        updateUI(saved);
    };
</script>

</body>
</html>
