<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZPD Police Department</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>ZPD Police Department</h1>
    </header>
    <main>
        <div id="gem-container">
            <img src="gem=1.png" alt="Gem 1" class="gem" />
            <img src="gem=2.png" alt="Gem 2" class="gem" />
            <img src="gem=3.png" alt="Gem 3" class="gem" />
        </div>
        <div class="slots">
            <div class="slot" data-slot-id="1"></div>
            <div class="slot" data-slot-id="2"></div>
            <div class="slot" data-slot-id="3"></div>
        </div>
    </main>
    <script>
        // Restoring original functionality with localStorage
        const slots = document.querySelectorAll('.slot');
        const gems = document.querySelectorAll('.gem');
        gems.forEach(gem => {
            gem.addEventListener('click', () => {
                // Logic to add gem to slot and store in localStorage.
                let slotId = prompt('Enter slot number (1, 2, or 3):');
                if (slotId >= 1 && slotId <= 3) {
                    slots[slotId - 1].appendChild(gem.cloneNode());
                    localStorage.setItem(`slot${slotId}`, gem.src);
                    alert('Gem added to slot!');
                }
            });
        });
    </script>
</body>
</html>
