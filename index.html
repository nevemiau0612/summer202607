<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZPD 終極終端 V10</title>
    <style>
        :root { --gold: #fbaf00; --cyan: #00ebff; --dark: #020612; --blue: #0a2463; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--dark); color: white; margin: 0; text-align: center; }

        .header { background: var(--blue); padding: 25px; border-bottom: 4px solid var(--gold); }
        .header h1 { margin: 0; font-size: 22px; color: var(--gold); letter-spacing: 2px; }
        
        .status-box { padding: 20px; background: rgba(255,255,255,0.05); }
        .status-text { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 10px; }
        .bar { height: 12px; background: #111; border-radius: 6px; border: 1px solid #333; overflow: hidden; }
        #fill { height: 100%; width: 0%; background: var(--cyan); transition: 1s cubic-bezier(0.075, 0.82, 0.165, 1); }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; max-width: 450px; margin: auto; }
        .slot { 
            aspect-ratio: 1; background: #080808; border: 2px solid #222; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0.15; filter: grayscale(1); transition: 0.5s;
        }
        .slot.active { opacity: 1; filter: grayscale(0); border-color: var(--cyan); background: rgba(0,235,255,0.1); box-shadow: 0 0 15px rgba(0,235,255,0.2); }
        .slot img { width: 65%; height: 65%; object-fit: contain; }
        .slot span { font-size: 16px; margin-top: 8px; color: #555; }
        .active span { color: var(--cyan); font-weight: bold; }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .card { background: var(--blue); border: 3px solid var(--gold); width: 85%; max-width: 320px; padding: 30px; border-radius: 20px; }
        .card h2 { font-size: 22px; color: var(--gold); margin: 0 0 15px; }
        .card p { font-size: 16px; line-height: 1.6; margin-bottom: 25px; }
        .card button { width: 100%; padding: 15px; background: var(--gold); border: none; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        
        #boot { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { background: var(--blue); border: 2px solid var(--cyan); color: var(--cyan); padding: 18px 40px; font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

<div id="boot">
    <div style="font-size: 24px; color: var(--cyan); font-weight: bold; margin-bottom: 30px;">ZPD 警用系統啟動中</div>
    <button class="start-btn" onclick="runSystem()">登入紀錄簿</button>
</div>

<div class="header"><h1>聖靈寶石偵查紀錄簿</h1></div>
<div class="status-box">
    <div class="status-text"><span>當前案件進度</span><span id="p-txt">0%</span></div>
    <div class="bar"><div id="fill"></div></div>
</div>
<div class="grid" id="grid"></div>

<div id="overlay">
    <div class="card">
        <h2 id="t"></h2>
        <p id="b"></p>
        <button onclick="closePop()">存入系統資料庫</button>
    </div>
</div>

<script>
    const GEMS = {
        '1': {n:'喜樂', m:'靠主常存喜樂，是健康的良藥。'},
        '2': {n:'恩慈', m:'良善的心能化解一切仇恨。'},
        '3': {n:'節制', m:'能掌管情緒的人才是真正強者。'},
        '4': {n:'仁愛', m:'愛是所有品格中最偉大的力量。'},
        '5': {n:'和平', m:'使人和睦的人，必稱為神的兒子。'},
        '6': {n:'溫柔', m:'柔和的回答能消退怒氣。'},
        '7': {n:'忍耐', m:'在困境中學習等待，神必開路。'},
        '8': {n:'信實', m:'誠實守信是警員最珍貴的品格。'},
        '9': {n:'良善', m:'心存正直，行神眼中看為正的事。'}
    };

    const DB_KEY = 'ZPD_FINAL_DATA_V10';

    function runSystem() {
        document.getElementById('boot').style.display = 'none';
        
        let currentData = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
        const params = new URLSearchParams(window.location.search);
        const newGem = params.get('gem');

        if (newGem && GEMS[newGem]) {
            // 關鍵：確保是「加入」而不是「重置」
            if (!currentData.includes(String(newGem))) {
                currentData.push(String(newGem));
                localStorage.setItem(DB_KEY, JSON.stringify(currentData));
            }
            // 彈窗顯示
            document.getElementById('t').innerText = "尋獲：" + GEMS[newGem].n + "寶石";
            document.getElementById('b').innerText = GEMS[newGem].m;
            document.getElementById('overlay').style.display = 'flex';
            
            // 清理網址參數，防止重新整理重複觸發
            window.history.replaceState({}, '', window.location.pathname);
        }
        render(currentData);
    }

    function render(list) {
        let html = '';
        for(let i=1; i<=9; i++) {
            const active = list.includes(String(i));
            html += `<div class="slot ${active ? 'active' : ''}">
                        <img src="https://nevemiau0612.github.io/summer202607/gem${i}.png">
                        <span>${GEMS[i].n}</span>
                    </div>`;
        }
        document.getElementById('grid').innerHTML = html;
        const pct = Math.floor((list.length / 9) * 100);
        document.getElementById('p-txt').innerText = pct + "%";
        document.getElementById('fill').style.width = pct + "%";
    }

    function closePop() { document.getElementById('overlay').style.display = 'none'; }

    // 初始化網面
    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
        render(saved);
    };
</script>
</body>
</html>
