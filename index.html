<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZPD 終極偵查終端</title>
    <style>
        :root { --gold: #fbaf00; --cyan: #00ebff; --dark: #050a15; --blue: #0a2463; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* 啟動動畫畫面 */
        #boot-screen {
            position: fixed; inset: 0; background: black; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .loading-bar { width: 200px; height: 4px; background: #222; margin-top: 20px; border-radius: 2px; overflow: hidden; }
        .loading-progress { width: 0%; height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); animation: load 1.5s forwards; }
        @keyframes load { to { width: 100%; } }

        /* 標題欄 */
        .header { background: linear-gradient(to bottom, var(--blue), #000); padding: 20px; border-bottom: 3px solid var(--gold); }
        .header h1 { margin: 0; font-size: 22px; color: var(--gold); letter-spacing: 2px; }
        .header p { margin: 5px 0 0; font-size: 10px; opacity: 0.7; }

        /* 進度條 */
        .status-panel { padding: 15px; background: rgba(255,255,255,0.05); margin: 10px; border-radius: 8px; }
        .progress-container { height: 10px; background: #111; border-radius: 5px; margin-top: 8px; border: 1px solid #333; }
        #progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--cyan)); width: 0%; transition: 1s; }

        /* 寶石網格 */
        .gem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 15px; max-width: 500px; margin: auto; }
        .gem-slot { 
            aspect-ratio: 1; background: #080808; border: 2px solid #222; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; position: relative;
            transition: 0.4s; grayscale: 100%; opacity: 0.4;
        }
        .gem-slot.unlocked { 
            border-color: var(--cyan); background: rgba(0, 235, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 235, 255, 0.2); grayscale: 0%; opacity: 1;
        }
        .gem-slot img { width: 75%; height: 75%; object-fit: contain; }
        .gem-label { position: absolute; bottom: 5px; font-size: 10px; color: #555; }
        .unlocked .gem-label { color: var(--cyan); font-weight: bold; }

        /* 彈窗 */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 1000; align-items: center; justify-content: center; }
        #modal { background: var(--blue); border: 2px solid var(--gold); border-radius: 15px; width: 85%; max-width: 320px; padding: 25px; text-align: center; }
        #modal h2 { color: var(--gold); margin: 0 0 15px; }
        #modal p { line-height: 1.6; margin-bottom: 20px; }
        #modal button { 
            background: var(--gold); border: none; padding: 12px 30px; border-radius: 25px; 
            font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; 
        }
    </style>
</head>
