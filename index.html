<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZPD 終極偵查終端 V5</title>
    <style>
        :root { --gold: #fbaf00; --cyan: #00ebff; --dark: #050a15; --blue: #0a2463; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; }

        /* 啟動動畫 */
        #boot-screen {
            position: fixed; inset: 0; background: black; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .loading-bar { width: 200px; height: 4px; background: #222; margin-top: 20px; border-radius: 2px; overflow: hidden; }
        .loading-progress { width: 0%; height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); animation: load 1.2s forwards; }
        @keyframes load { to { width: 100%; } }

        /* 主介面佈局 */
        .container { display: flex; flex-direction: column; height: 100vh; }
        .header { background: linear-gradient(to bottom, var(--blue), #000); padding: 15px; border-bottom: 3px solid var(--gold); flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 20px; color: var(--gold); letter-spacing: 2px; }

        .status-panel { padding: 12px; background: rgba(255,255,255,0.05); margin: 8px; border-radius: 8px; flex-shrink: 0; }
        .progress-container { height: 8px; background: #111; border-radius: 4px; margin-top: 6px; border: 1px solid #333; overflow: hidden; }
        #progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--cyan)); width: 0%; transition: 1s cubic-bezier(0.1, 0.7, 1.0, 0.1); }

        /* 網格區域 - 增加捲動支援 */
        .grid-wrapper { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .gem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 450px; margin: auto; }

            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.4s; filter: grayscale(1) brightness(0.4); opacity: 0.5;
        }
