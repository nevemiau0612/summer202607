<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Boot Screen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        #boot-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            transition: opacity 0.5s ease;
        }
        #boot-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .gem {
            transition: transform 0.3s ease;
        }
        .gem:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div id="boot-screen">
        <h1>Welcome to the Gem Unlocker!</h1>
        <button id="close-button">Close</button>
    </div>
    <div id="gems">
        <div class="gem" data-message="Unlock the first gem for a special surprise!">Gem 1</div>
        <div class="gem" data-message="Congratulations! You've unlocked the second gem!">Gem 2</div>
        <div class="gem" data-message="You've done it! The third gem is now yours!">Gem 3</div>
    </div>
    <script>
        document.getElementById('close-button').onclick = function() {
            document.getElementById('boot-screen').classList.add('hidden');
        };
        const gems = document.querySelectorAll('.gem');
        gems.forEach(gem => {
            gem.onclick = function() {
                alert(this.dataset.message);
            };
        });
    </script>
</body>
</html>
