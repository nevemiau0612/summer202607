<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 警用終端機 </title>
    <style>
        :root { --zpd-blue: #0a2463; --zpd-dark: #020612; --zpd-gold: #fbaf00; --zpd-cyan: #00ebff; }
        body { background: var(--zpd-dark); color: white; font-family: monospace; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* 啟動畫面 */
        #boot-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; z-index: 999; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer;
        }

        #boot-title { 
            color: var(--zpd-cyan); 
            font-size: 28px; 
            font-weight: bold; 
            letter-spacing: 2px; 
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 235, 255, 0.5);
        }

        #boot-msg { font-size: 18px; color: #ccc; margin: 10px 0; }
        #boot-hint { font-size: 14px; color: #666; margin-top: 40px; border: 1px solid #333; padding: 5px 15px; }

        .header { background: var(--zpd-blue); padding: 15px; border-bottom: 4px solid var(--zpd-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .gem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px; max-width: 400px; margin: auto; }
        .gem-slot { aspect-ratio: 1; border: 1px solid #333; border-radius: 8px; background: #080808; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .gem-icon { width: 80%; height: 80%; object-fit: contain; filter: grayscale(100%) brightness(30%); opacity: 0.3; transition: 0.5s; }
        
        .gem-slot.unlocked { border-color: var(--zpd-cyan); background: rgba(0, 235, 255, 0.1); box-shadow: inset 0 0 10px rgba(0, 235, 255, 0.3); }
        .unlocked .gem-icon { filter: grayscale(0%) brightness(100%); opacity: 1; transform: scale(1.1); }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 100; }
        #alert-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--zpd-blue); border: 2px solid var(--zpd-gold); padding: 20px; display: none; z-index: 101; width: 85%; max-width: 300px; border-radius: 10px; }
        button { width: 100%; padding: 12px; background: var(--zpd-gold); border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; color: black; }
    </style>
</head>
